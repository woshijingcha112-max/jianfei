server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: diet-record-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/dev_cse_finance?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
  global-config:
    banner: false

app:
  fixed-user-id: 1
  storage:
    upload-root: ${UPLOAD_ROOT:D:/data/diet-app/uploads}
    access-prefix: ${UPLOAD_ACCESS_PREFIX:/uploads}
  photo:
    image:
      min-dimension: 15
      preserve-max-bytes: 1200000
      compressed-target-max-bytes: 900000
      max-dimension: 1920
      jpeg-quality: 0.88
    ai:
      enabled: true
      provider: zhipu
      timeout-millis: 45000
      default-meal-type: 待确认
      baidu:
        enabled: false
        app-id: ${PHOTO_AI_BAIDU_APP_ID:}
        token-endpoint: https://aip.baidubce.com/oauth/2.0/token
        endpoint: https://aip.baidubce.com/rest/2.0/image-classify/v2/dish
        api-key: ${PHOTO_AI_BAIDU_API_KEY:}
        secret-key: ${PHOTO_AI_BAIDU_SECRET_KEY:}
        top-num: 5
        baike-num: 1
        token-refresh-before-seconds: 300
      zhipu:
        enabled: true
        endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
        api-key: ${PHOTO_AI_ZHIPU_API_KEY:}
        model: glm-5v-turbo
        max-tokens: 2048
        temperature: 0.1
