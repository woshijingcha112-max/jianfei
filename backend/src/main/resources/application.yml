server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: diet-record-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/dev_cse_finance?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
  global-config:
    banner: false

app:
  fixed-user-id: 1
  storage:
    upload-root: ${UPLOAD_ROOT:D:/data/diet-app/uploads}
    access-prefix: ${UPLOAD_ACCESS_PREFIX:/uploads}
  photo:
    image:
      min-dimension: 15
      preserve-max-bytes: 1200000
      compressed-target-max-bytes: 900000
      max-dimension: 1920
      jpeg-quality: 0.88
    ai:
      enabled: true
      provider: zhipu
      timeout-millis: 45000
      default-meal-type: 待确认
      baidu:
        enabled: false
        app-id: ${PHOTO_AI_BAIDU_APP_ID:}
        token-endpoint: https://aip.baidubce.com/oauth/2.0/token
        endpoint: https://aip.baidubce.com/rest/2.0/image-classify/v2/dish
        api-key: ${PHOTO_AI_BAIDU_API_KEY:}
        secret-key: ${PHOTO_AI_BAIDU_SECRET_KEY:}
        top-num: 5
        baike-num: 1
        token-refresh-before-seconds: 300
      zhipu:
        enabled: true
        endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
        api-key: ${PHOTO_AI_ZHIPU_API_KEY:}
        model: glm-4.6v
        max-tokens: 2048
        temperature: 0.1
        prompt: |
          你是减肥饮食记录场景的图片识别助手。
          你必须基于图片内容，输出一个严格可解析的 JSON 对象。
          不要输出 Markdown，不要输出代码块，不要输出解释说明，不要补充 JSON 之外的任何文字。
          如果有不确定项，可以填写“待确认”或降低置信度，但仍然必须返回 JSON。
          输出结构必须以“图片识别结果”为根节点，并尽量包含以下字段：
          {
            "图片识别结果": {
              "请求编号": "",
              "图片地址": "",
              "识别时间": "",
              "用餐类型": "早餐/午餐/晚餐/加餐/待确认",
              "记录日期": "",
              "整道菜信息": {
                "菜品名称": "",
                "菜品置信度": "",
                "菜品分类": "",
                "场景描述": ""
              },
              "食材明细": [
                {
                  "食材名称": "",
                  "识别置信度": "",
                  "估算重量克": "",
                  "估算热量": "",
                  "食材分类": "",
                  "烹饪状态": "",
                  "来源": "智谱清言"
                }
              ],
              "汇总信息": {
                "总估算热量": "",
                "是否需要人工确认": "是/否",
                "需要人工确认原因": ""
              }
            }
          }
          识别重点：
          1. 优先识别复杂菜品中的具体食材，而不是只说整道菜。
          2. 食材明细尽量细到可用于减肥记录，例如青菜、藕片、午餐肉、金针菇、豆腐、丸类。
          3. 热量和重量允许估算，但不要留空；无法判断时填写保守估值并在人工确认字段说明。
          4. 用餐类型如果无法仅凭图片判断，填写“待确认”。
          5. 来源固定填写“智谱清言”。
