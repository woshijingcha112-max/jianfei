server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: diet-record-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/diet_record?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  fixed-user-id: 1
  storage:
    upload-root: ${UPLOAD_ROOT:D:/data/diet-app/uploads}
    access-prefix: ${UPLOAD_ACCESS_PREFIX:/uploads}
  baidu-ai:
    enabled: false
    api-key: ${BAIDU_AI_API_KEY:}
    secret-key: ${BAIDU_AI_SECRET_KEY:}
    dish-url: https://aip.baidubce.com/rest/2.0/image-classify/v2/dish
